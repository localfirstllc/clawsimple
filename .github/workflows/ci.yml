name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint
        name: Lint

      - run: pnpm exec fumadocs-mdx
        name: Generate MDX source

      - run: pnpm exec tsc --noEmit
        name: Typecheck

      - run: pnpm test:ci
        name: Unit Tests

      - run: pnpm test:coverage
        name: Coverage

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - run: pnpm build
        name: Build
